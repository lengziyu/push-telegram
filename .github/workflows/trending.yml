name: GitHub Trending to Telegram

on:
  schedule:
    - cron: "0 1 * * *" # Every day at 09:00 Asia/Shanghai (UTC+8)
    - cron: "30 11 * * *" # Every day at 19:30 Asia/Shanghai (UTC+8)
  workflow_dispatch:
    inputs:
      publish_blog:
        description: "Also publish blog post in this manual run"
        required: false
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.OPENROUTER_API_KEY || vars.OPENAI_API_KEY || vars.OPENROUTER_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL || 'https://openrouter.ai/api/v1' }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL || 'openrouter/free' }}
      OPENROUTER_SITE_URL: ${{ secrets.OPENROUTER_SITE_URL || vars.OPENROUTER_SITE_URL }}
      OPENROUTER_APP_NAME: ${{ secrets.OPENROUTER_APP_NAME || vars.OPENROUTER_APP_NAME || 'push-telegram' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
      ADMIN_BASE_URL: ${{ secrets.ADMIN_BASE_URL || vars.ADMIN_BASE_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || vars.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || vars.ADMIN_PASSWORD }}
      RUN_NIGHT_BLOG: ${{ (github.event_name == 'schedule' && github.event.schedule == '30 11 * * *') || (github.event_name == 'workflow_dispatch' && inputs.publish_blog == 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for key in TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Validate blog publish secrets (night run only)
        if: env.RUN_NIGHT_BLOG == 'true'
        run: |
          set -euo pipefail
          missing=0
          for key in ADMIN_BASE_URL ADMIN_USERNAME ADMIN_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret for blog publish: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Run script
        run: python main.py

      - name: Troubleshooting hint on failure
        if: failure()
        run: |
          echo "::warning::Run failed. Please verify TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID and OpenRouter secrets in repo Settings -> Secrets and variables -> Actions."
